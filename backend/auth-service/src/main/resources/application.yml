server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trafficlens}
    username: ${SPRING_DATASOURCE_USERNAME:trafficlens}
    password: ${SPRING_DATASOURCE_PASSWORD:trafficlens123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:trafficlens-super-secret-jwt-key-2024-production}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: 604800000
